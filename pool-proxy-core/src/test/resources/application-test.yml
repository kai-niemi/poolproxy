spring:
  datasource:
    url: jdbc:postgresql://localhost:26257/defaultdb?sslmode=disable6allow_unsafe_internals=true
    driver-class-name: org.postgresql.Driver
    username: root
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 0
      auto-commit: true
      transaction-isolation: TRANSACTION_SERIALIZABLE
      initialization-fail-timeout: -1
logging:
  pattern:
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:HH:mm:ss.SSS}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) [%t] %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}"
